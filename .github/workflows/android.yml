name: Android CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --stacktrace 2>&1 | tee android-build.log
          status=${PIPESTATUS[0]}
          echo "GRADLE_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-build-log
          path: android-build.log
          if-no-files-found: error

      - name: Fail when Gradle failed
        if: env.GRADLE_STATUS != '0'
        run: exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoVideo-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
